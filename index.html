<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>饥荒联机版 Mod 开发完全指南</title>
  <meta name="description" content="饥荒联机版（Don't Starve Together）Mod 开发教程，从 Lua 基础到高级系统全覆盖">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    :root {
      --base-font-size: 15px;
      --theme-color: #ea6f5a;
      --sidebar-width: 280px;
      --sidebar-nav-link-color--active: #ea6f5a;
      --sidebar-name-color: #ea6f5a;
      --sidebar-name-font-size: 1.3em;
      --code-font-size: 0.9em;
      --blockquote-border-color: #ea6f5a;
    }
    .sidebar-nav > ul > li > p {
      font-weight: bold;
      margin: 0.8em 0 0.4em;
      color: #333;
    }
    .markdown-section code {
      background-color: #f6f8fa;
      border-radius: 3px;
      padding: 2px 6px;
    }
    .markdown-section pre > code {
      padding: 1em;
    }
  </style>
</head>
<body>
  <div id="app">正在加载...</div>
  <script>
    window.$docsify = {
      name: '饥荒联机版 Mod 开发完全指南',
      loadSidebar: true,
      maxLevel: 4,
      subMaxLevel: 3,
      auto2top: true,
      coverpage: false,
      search: {
        placeholder: '搜索教程内容',
        noData: '没有找到结果',
        paths: 'auto'
      },
      pagination: {
        previousText: '上一章',
        nextText: '下一章',
        crossChapter: true,
        crossChapterText: true
      },
      copyCode: {
        buttonText: '复制',
        errorText: '复制失败',
        successText: '已复制'
      }
    }
  </script>
  <!-- docsify 核心 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <!-- 搜索插件 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <!-- Lua 代码高亮 -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-lua.min.js"></script>
  <!-- 翻页插件 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <!-- 代码复制插件 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
</body>
</html>
